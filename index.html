<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ご予約 | CUT-SPACE YOSHIDA</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a2a3a;
    --accent: #c8a96e;
    --accent2: #e74c3c;
    --white: #ffffff;
    --bg: #f7f4ef;
    --text: #2c2c2c;
    --muted: #888;
    --border: #ddd;
    --success: #27ae60;
    --booked: #e74c3c;
    --blocked: #f39c12;
    --card-bg: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Noto Sans JP", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ヘッダー */
  .site-header { background: var(--primary); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
  .header-inner { max-width: 720px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
  .shop-logo { font-family: "Oswald", sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--accent); letter-spacing: 2px; line-height: 1; }
  .shop-logo span { display: block; font-size: 0.6rem; color: rgba(255,255,255,0.5); letter-spacing: 3px; font-family: "Noto Sans JP", sans-serif; font-weight: 400; margin-top: 3px; }
  .header-badge { background: var(--accent); color: var(--primary); font-size: 0.7rem; font-weight: 700; padding: 4px 12px; border-radius: 20px; letter-spacing: 1px; }

  /* ヒーロー */
  .hero { background: linear-gradient(160deg, #1a2a3a 0%, #2c4a6e 60%, #1a2a3a 100%); padding: 36px 20px 32px; text-align: center; position: relative; overflow: hidden; }
  .hero::before { content: "✂"; position: absolute; font-size: 180px; opacity: 0.04; top: -20px; right: -20px; color: var(--accent); line-height: 1; }
  .hero-title { font-family: "Oswald", sans-serif; font-size: 1.9rem; font-weight: 700; color: var(--white); letter-spacing: 3px; margin-bottom: 8px; }
  .hero-sub { font-size: 0.85rem; color: rgba(255,255,255,0.6); letter-spacing: 1px; margin-bottom: 16px; }
  .hero-info { display: inline-flex; gap: 20px; background: rgba(255,255,255,0.08); border: 1px solid rgba(200,169,110,0.3); border-radius: 30px; padding: 8px 20px; font-size: 0.78rem; color: var(--accent); font-weight: 700; letter-spacing: 1px; flex-wrap: wrap; justify-content: center; }

  /* メイン */
  .main { max-width: 720px; margin: 0 auto; padding: 20px 16px 60px; }

  /* ステップ */
  .steps { display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
  .step-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .step-circle { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); background: white; color: var(--muted); font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
  .step-circle.active { background: var(--primary); border-color: var(--primary); color: white; }
  .step-circle.done { background: var(--success); border-color: var(--success); color: white; }
  .step-label { font-size: 0.62rem; color: var(--muted); font-weight: 700; white-space: nowrap; }
  .step-label.active { color: var(--primary); }
  .step-line { width: 50px; height: 2px; background: var(--border); margin-bottom: 14px; transition: 0.3s; }
  .step-line.done { background: var(--success); }

  /* カード */
  .card { background: var(--card-bg); border-radius: 16px; padding: 24px 20px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); border: 1px solid rgba(0,0,0,0.06); }
  .card-title { font-size: 1rem; font-weight: 700; color: var(--primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
  .card-title .icon { width: 28px; height: 28px; background: var(--primary); color: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0; }

  /* フォーム */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 0.78rem; font-weight: 700; color: #555; margin-bottom: 6px; letter-spacing: 0.5px; }
  .form-label .required { color: var(--accent2); font-size: 0.7rem; margin-left: 4px; font-weight: 400; }
  .form-input, .form-textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 1rem; font-family: "Noto Sans JP", sans-serif; background: #fafafa; color: var(--text); transition: 0.2s; }
  .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(26,42,58,0.1); }
  .form-textarea { min-height: 80px; resize: vertical; }

  /* 時間スロット */
  .time-slots { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; grid-auto-rows: 1fr; align-items: stretch; }
  .time-slot { box-sizing: border-box; min-height: 52px; padding: 12px 4px; border: 1.5px solid var(--border); border-radius: 10px; text-align: center; font-size: 0.85rem; font-weight: 700; cursor: pointer; background: #fafafa; color: var(--text); transition: 0.15s; user-select: none; position: relative; line-height: 1.3; }
  .time-slot.selected { background: var(--primary); border-color: var(--primary); color: white; }
  .time-slot.booked { background: #fdecea; color: #c0392b; cursor: not-allowed; border-color: #f1948a; }
  .time-slot.booked::after { content: "×"; font-size: 0.7rem; display: block; color: #c0392b; }
  .time-slot.blocked { background: #fdecea; color: #c0392b; cursor: not-allowed; border-color: #f1948a; }
  .time-slot.blocked::after { content: "予約"; font-size: 0.62rem; display: block; color: #c0392b; margin-top: 1px; }

  /* 凡例 */
  .slot-legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.7rem; color: var(--muted); font-weight: 700; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; border: 1.5px solid; }
  .legend-dot.ok { background: #fafafa; border-color: var(--border); }
  .legend-dot.booked { background: #fdecea; border-color: #f1948a; }
  .legend-dot.selected { background: var(--primary); border-color: var(--primary); }

  /* メニュー */
  .menu-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .menu-option { border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 12px; cursor: pointer; background: #fafafa; transition: 0.15s; }
  .menu-option.selected { border-color: var(--primary); background: linear-gradient(135deg, #1a2a3a 0%, #2c4a6e 100%); color: white; }
  .menu-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; }
  .menu-price { font-size: 0.8rem; color: var(--accent2); font-weight: 700; }
  .menu-desc { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

  /* 注意書き・ボタン */
  .notice { background: #fff8e8; border: 1px solid #f0c060; border-radius: 10px; padding: 12px 14px; font-size: 0.78rem; color: #7a5a00; line-height: 1.7; margin-bottom: 16px; }
  .submit-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #1a2a3a, #2c4a6e); color: white; font-size: 1.05rem; font-weight: 700; border: none; border-radius: 14px; cursor: pointer; letter-spacing: 2px; margin-top: 8px; }
  .submit-btn:disabled { opacity: 0.5; }
  
  .confirm-section, .complete-section { display: none; }
  .site-footer { background: var(--primary); color: rgba(255,255,255,0.5); text-align: center; padding: 20px; font-size: 0.75rem; }
  
  @media (max-width: 480px) {
    .time-slots { grid-template-columns: repeat(3, 1fr); }
    .menu-options { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="shop-logo">CUT-SPACE YOSHIDA<span>BARBER SHOP</span></div>
    <div class="header-badge">✂ ネット予約</div>
  </div>
</header>

<div class="hero">
  <div class="hero-title">ご予約はこちらから</div>
  <div class="hero-sub">24時間・いつでも簡単予約</div>
  <div class="hero-info">
    <span id="closedDayLabel">📅 定休日：毎週火曜日・第2・第3月曜日</span>
    <span>🕐 8:00 〜 18:00</span>
  </div>
</div>

<div class="main">
  <div class="steps" id="stepsBar">
    <div class="step-item"><div class="step-circle active" id="step1circle">1</div><div class="step-label active">入力</div></div>
    <div class="step-line" id="line1"></div>
    <div class="step-item"><div class="step-circle" id="step2circle">2</div><div class="step-label">確認</div></div>
    <div class="step-line" id="line2"></div>
    <div class="step-item"><div class="step-circle" id="step3circle">3</div><div class="step-label">完了</div></div>
  </div>

  <div id="formSection">
    <div class="card">
      <div class="card-title"><div class="icon">👤</div>お客様情報</div>
      <div class="form-group">
        <label class="form-label">お名前 <span class="required">※必須</span></label>
        <input type="text" class="form-input" id="guestName" placeholder="例：吉田 太郎">
      </div>
      <div class="form-group">
        <label class="form-label">電話番号 <span class="required">※必須</span></label>
        <input type="tel" class="form-input" id="guestPhone" placeholder="例：090-1234-5678">
      </div>
    </div>

    <div class="card">
      <div class="card-title"><div class="icon">✂</div>メニュー</div>
      <div class="menu-options" id="menuContainer">
        <div class="menu-option" onclick="selectMenu(this,'カットセット')">
          <div class="menu-name">✂ カットセット</div><div class="menu-price">¥4,200</div>
        </div>
        <div class="menu-option" onclick="selectMenu(this,'カラーカットセット')">
          <div class="menu-name">🎨 カラーカットセット</div><div class="menu-price">¥7,400〜</div>
        </div>
        <div class="menu-option" onclick="selectMenu(this,'パーマカットセット')">
          <div class="menu-name">🌀 パーマカットセット</div><div class="menu-price">¥8,400〜</div>
        </div>
        <div class="menu-option" onclick="selectMenu(this,'顔そり')">
          <div class="menu-name">🪒 顔そり</div><div class="menu-price">¥2,500</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><div class="icon">📅</div>日時</div>
      <div class="form-group">
        <input type="date" class="form-input" id="reserveDate" onchange="onDateChange()">
      </div>
      <div id="timeSlots" class="time-slots"></div>
      <div class="slot-legend">
        <div class="legend-item"><div class="legend-dot ok"></div>予約可</div>
        <div class="legend-item"><div class="legend-dot booked"></div>予約済</div>
        <div class="legend-item"><div class="legend-dot selected"></div>選択中</div>
      </div>
    </div>

    <button class="submit-btn" onclick="goToConfirm()">内容を確認する →</button>
  </div>

  <div id="confirmSection" class="confirm-section">
    <div class="card">
      <div class="card-title">✅ 予約内容の確認</div>
      <div id="confirmDisplay" style="line-height:2; font-weight:700;"></div>
    </div>
    <button class="submit-btn" id="finalSubmitBtn" onclick="submitReservation()">この内容で予約を確定する</button>
    <button class="submit-btn" style="background:#888; margin-top:10px;" onclick="location.reload()">戻る</button>
  </div>

  <div id="completeSection" class="complete-section">
    <div class="card" style="text-align:center;">
      <div style="font-size:3rem;">🎉</div>
      <h2>予約が完了しました</h2>
      <p>ご来店をお待ちしております。</p>
      <button class="submit-btn" onclick="location.reload()">トップへ戻る</button>
    </div>
  </div>
</div>

<footer class="site-footer">
  <strong>CUT-SPACE YOSHIDA</strong> &nbsp;|&nbsp; ネット予約システム v3.29
</footer>

<script>
// ============================================================
// ★ 設定項目
// ============================================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbzjebnfsEvuj5CtzhhDdB6nU97BQfOYoDpP7m4y1UwoyTNXmuR35nCzgiOiPBjavsMZJQ/exec";

const SHOP_CONFIG = {
  weeklyClosedDays: [2], // 火曜
  monthlyClosedMondays: [2, 3], // 第2・3月曜
  openHour: 8,
  closeHour: 18,
  slotMinutes: 30
};

let selectedMenu = "";
let selectedTime = "";

// ============================================================
// 1. 送信処理 (GASへ)
// ============================================================
async function submitReservation() {
  const btn = document.getElementById("finalSubmitBtn");
  btn.disabled = true;
  btn.textContent = "送信中...";

  const reservation = {
    name: document.getElementById('guestName').value,
    phone: document.getElementById('guestPhone').value,
    date: document.getElementById('reserveDate').value,
    time: selectedTime,
    menu: selectedMenu,
    status: "未受付",
    submittedAt: new Date().toLocaleString()
  };

  try {
    await fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(reservation)
    });
    
    document.getElementById("confirmSection").style.display = "none";
    document.getElementById("completeSection").style.display = "block";
    document.getElementById("step2circle").classList.add("done");
    document.getElementById("step3circle").classList.add("active");
  } catch (e) {
    alert("送信エラーが発生しました。お電話にてご連絡ください。");
    btn.disabled = false;
    btn.textContent = "この内容で予約を確定する";
  }
}

// ============================================================
// 2. 予約データの同期 (GASから読み込み)
// ============================================================
function syncReservations() {
  fetch(GAS_URL + "?action=allReservations")
    .then(res => res.json())
    .then(data => {
      localStorage.setItem("yoshida_reservations", JSON.stringify(data));
      onDateChange(); // 読み込み後に表示を更新
    })
    .catch(e => console.warn("同期エラー:", e));
}

// ============================================================
// 3. UI制御ロジック
// ============================================================
function selectMenu(el, name) {
  document.querySelectorAll('.menu-option').forEach(opt => opt.classList.remove('selected'));
  el.classList.add('selected');
  selectedMenu = name;
}

function onDateChange() {
  const dateStr = document.getElementById("reserveDate").value;
  if (!dateStr) return;
  generateTimeSlots(dateStr);
}

function generateTimeSlots(dateStr) {
  const container = document.getElementById("timeSlots");
  container.innerHTML = "";
  
  // 定休日判定
  const d = new Date(dateStr);
  const dow = d.getDay();
  const nth = Math.ceil(d.getDate() / 7);
  if (SHOP_CONFIG.weeklyClosedDays.includes(dow) || (dow === 1 && SHOP_CONFIG.monthlyClosedMondays.includes(nth))) {
    container.innerHTML = "<p style='color:red; font-weight:700;'>定休日です</p>";
    return;
  }

  // 予約済みデータ取得
  const reservations = JSON.parse(localStorage.getItem("yoshida_reservations") || "[]");
  const bookedTimes = new Set(reservations.filter(r => r.date === dateStr && r.status !== "キャンセル").map(r => r.time));

  for (let h = SHOP_CONFIG.openHour; h < SHOP_CONFIG.closeHour; h++) {
    for (let m of [0, 30]) {
      const timeStr = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
      const slot = document.createElement("div");
      slot.className = "time-slot";
      if (bookedTimes.has(timeStr)) {
        slot.classList.add("booked");
        slot.textContent = timeStr;
      } else {
        slot.textContent = timeStr;
        slot.onclick = () => {
          document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
          slot.classList.add('selected');
          selectedTime = timeStr;
        };
      }
      container.appendChild(slot);
    }
  }
}

function goToConfirm() {
  if (!document.getElementById('guestName').value || !selectedMenu || !selectedTime) {
    alert("お名前、メニュー、時間を選択してください");
    return;
  }
  document.getElementById("formSection").style.display = "none";
  document.getElementById("confirmSection").style.display = "block";
  document.getElementById("step1circle").classList.add("done");
  document.getElementById("step2circle").classList.add("active");
  
  document.getElementById("confirmDisplay").innerHTML = `
    お名前：${document.getElementById('guestName').value}<br>
    メニュー：${selectedMenu}<br>
    日時：${document.getElementById('reserveDate').value} ${selectedTime}
  `;
}

// 起動時設定
window.onload = () => {
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById("reserveDate").value = today;
  document.getElementById("reserveDate").min = today;
  syncReservations();
};
</script>
</body>
</html>
